# demo.sparkmanagement.conf
# resolver 127.0.0.1 valid=30s; # Adresse IP du serveur DNS à utiliser

server {
    # listen 443 ssl;
    # listen [::]:443 ssl;
    
    listen 80;
    listen [::]:80;

    server_name 127.0.0.1 localhost sparkmanagement.demo www.sparkmanagement.demo;

    # ssl_certificate /etc/nginx/ssl/sparkmanagement.crt;
    # ssl_certificate_key /etc/nginx/ssl/sparkmanagement.key;

    # ssl_protocols		TLSv1.2 TLSv1.3;

    root /var/www/spark-management-laravel/public;
    index index.php index.html index.htm index.nginx-debian.html ;

    location / {
        autoindex on;
        autoindex_format html;
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass web:9000;

        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_busy_buffers_size 32k;
        client_max_body_size 100M;
    }

    # Proxy for Vite (React dev)
    location /@vite/ {
        proxy_pass http://web:5173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /resources/ {
        proxy_pass http://web:5173/resources/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # location /ws {
    #     proxy_pass http://web:8080;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "Upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # location /app/ {
    #     proxy_pass         http://web:8080;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade $http_upgrade;
    #     proxy_set_header   Connection "Upgrade";
    #     proxy_set_header   Host $http_host;
    #     proxy_set_header   X-Real-IP $remote_addr;
    #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 60;
    # }


    error_log /var/log/nginx/sparkmanagement_error.log;
    access_log /var/log/nginx/sparkmanagement_access.log;
}